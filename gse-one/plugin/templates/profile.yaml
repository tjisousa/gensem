# GSE-One User Profile
# Generated by /gse:hug. Read by all activities and agents.
# This file captures user preferences and competency state
# to personalize the GSE-One agent's interaction style.
#
# Consumer subsystems:
# - All activities: P9 Adaptive Communication (reads dimensions.*)
# - Coach agent: pedagogy + profile calibration (reads dimensions.learning_goals,
#   dimensions.abstraction_capability, expertise_domains, competency_map)
# - Learn activity: LRN notes (reads competency_map.topics, updates on explain/practice)
# - Dashboard: display (reads user.name, dimensions.it_expertise)

version: 1                                  # Schema version (for future migration)
created: ""                                 # ISO 8601 date — first /gse:hug completion
updated: ""                                 # ISO 8601 date — last /gse:hug --update

user:
  name: ""                                  # User-provided display name
  git_email: ""                             # Denormalized from `git config user.email` for dashboard/coach reads

dimensions:                                 # Interview dimensions (13)
  it_expertise: ""                          # beginner | intermediate | advanced | expert
  scientific_expertise: ""                  # none | familiar | practitioner | researcher
  abstraction_capability: ""                # concrete-first | balanced | abstract-first
  language:
    chat: ""                                # ISO 639-1 (fr, en, de, ...)
    artifacts: en                           # ISO 639-1 (default: en)
    overrides: {}                           # per-artefact-type (e.g., {requirement: fr})
  preferred_verbosity: ""                   # terse | normal | detailed
  domain_background: ""                     # free text
  decision_involvement: ""                  # autonomous | collaborative | supervised
  project_domain: ""                        # web | api | cli | data | mobile | embedded | library | scientific | other
  team_context: ""                          # solo | pair | small-team | large-team
  learning_goals: []                        # list of short goal strings
                                            # example: ["Rust async patterns", "property-based testing"]
  contextual_tips: true                     # enable/disable inline micro-explanations
  emoji: true                               # enable/disable emoji in chat output

inferred: {}                                # Tracks which dimensions were inferred vs asked
  # keyed by dimension name, value true if inferred from Step 1 signals:
  # it_expertise: true
  # project_domain: true
  # team_context: true
  # language.chat: true

# --- Agent-populated sections (not asked at HUG) ---

# Progressive expertise by domain — populated by agent observation during activities.
# When a domain is listed, the agent uses it instead of the global it_expertise
# for communication calibration and decision tier classification in that domain.
expertise_domains: {}
  # Example after a few sprints:
  # frontend: advanced       # user corrected CSS issues spontaneously
  # backend: intermediate    # user asked clarifying questions but understood quickly
  # database: beginner       # user struggled with SQL joins
  # security: advanced       # user identified a vulnerability before the agent
  # testing: intermediate    # user wrote tests but needed guidance on coverage
  # devops: beginner         # user asked what CI/CD means

# Progressive competency tracking — populated by /gse:learn and contextual tips.
# Tracks which SE concepts have been covered, at what depth, and when.
# Used by /gse:learn to avoid re-explaining and by contextual tips to fill gaps.
competency_map:
  topics: {}
    # keyed by concept slug:
    # git-rebase:
    #   level: explained             # not-seen | mentioned | explained | practiced
    #   last_session: "2026-01-15"   # ISO 8601 date of last interaction
    #   mode: deep                   # quick | deep (from /gse:learn session)
    #   note: LRN-003                # reference to learning note if produced
