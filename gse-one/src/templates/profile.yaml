# GSE-One User Profile
# Generated by /gse:hug
# This file captures user preferences and competency state
# to personalize the GSE-One agent's interaction style.

user:
  name: ""
  it_expertise: ""          # beginner | intermediate | advanced | expert
  scientific_expertise: ""  # none | familiar | proficient | researcher
  abstraction_capability: "" # examples | balanced | abstractions
  language:
    chat: ""               # ISO 639-1 code — language for chat communication (e.g., fr, en, de)
    artifacts: en          # ISO 639-1 code — default language for produced files (code, docs, commits)
    overrides: {}          # per-artefact-type language overrides (e.g., {requirement: fr, learning-note: fr})
  preferred_verbosity: ""   # concise | standard | verbose
  domain_background: ""     # teaching | business | science | engineering | design
  decision_involvement: ""  # hands-off | balanced | hands-on
  project_domain: ""        # web | embedded | scientific | cli | library | mobile
  team_context: ""          # solo | small-team | large-team
  learning_goals: []
  contextual_tips: true     # enable/disable in-activity tips
  emoji: true               # enable/disable emoji in chat output

# Progressive expertise by domain (populated by agent observation, not by HUG).
# The agent detects expertise signals during activities and updates this section.
# When a domain is listed here, the agent uses it instead of the global it_expertise
# for communication calibration and decision tier classification in that domain.
expertise_domains: {}
  # Example after a few sprints:
  # frontend: advanced       # user corrected CSS issues spontaneously
  # backend: intermediate    # user asked clarifying questions but understood quickly
  # database: beginner       # user struggled with SQL joins
  # security: advanced       # user identified a vulnerability before the agent
  # testing: intermediate    # user wrote tests but needed guidance on coverage
  # devops: beginner         # user asked what CI/CD means

# Progressive competency tracking (populated by /gse:learn and contextual tips).
# Tracks which SE concepts have been covered, at what depth, and when.
# Used by /gse:learn to avoid re-explaining and by contextual tips to fill gaps.
competency_map:
  topics: {}
    # keyed by concept slug:
    # git-rebase:
    #   level: explained             # not-seen | mentioned | explained | practiced
    #   last_session: "2026-01-15"   # ISO 8601 date of last interaction
    #   mode: deep                   # quick | deep (from /gse:learn session)
    #   note: LRN-003               # reference to learning note if produced
